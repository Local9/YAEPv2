name: Security Hygiene

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS dependencies (lockfile enforced)
        run: pnpm install --frozen-lockfile

      - name: Audit JS dependencies
        run: pnpm audit --prod --audit-level=high

      - name: Validate prerelease dependency allowlist
        run: |
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const combined={...(pkg.dependencies||{}),...(pkg.devDependencies||{})};const allow=new Set(['layerchart','vaul-svelte']);const pre=Object.entries(combined).filter(([name,version])=>/-((alpha|beta|rc|next)\.?)/i.test(version));const disallowed=pre.filter(([name])=>!allow.has(name));if(disallowed.length){console.error('Disallowed prerelease dependencies found:');for(const [name,version] of disallowed){console.error(` - ${name}@${version}`);}process.exit(1);}console.log('Prerelease dependency policy check passed.');"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native dependencies (Tauri/Rust GTK stack)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev

      - name: Verify Cargo lockfile
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit Rust dependencies
        run: cargo audit --file src-tauri/Cargo.lock

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
