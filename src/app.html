<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: var(--background);
        color: var(--foreground);
        z-index: 9999;
        font-family: Inter, Segoe UI, system-ui, sans-serif;
      }

      #boot-splash .spinner {
        width: 2rem;
        height: 2rem;
        border-radius: 9999px;
        border: 2px solid var(--border);
        border-top-color: var(--primary);
        animation: boot-spin 1s linear infinite;
      }

      #boot-splash .label {
        font-size: 0.875rem;
        opacity: 0.85;
      }

      @keyframes boot-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      html[data-no-boot-splash="true"] #boot-splash {
        display: none;
      }
    </style>
    <script>
      const p = window.location.pathname;
      if (p.startsWith("/thumbnail-overlay") || p.startsWith("/widget-overlay")) {
        document.documentElement.setAttribute("data-no-boot-splash", "true");
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="boot-splash" aria-live="polite" aria-busy="true">
      <div class="spinner" aria-hidden="true"></div>
      <div class="label">Loading YAEP...</div>
    </div>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
